<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자연바람(Natural Breeze) - 서버 가동 중</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f1;
            color: #2d3e30;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { margin-bottom: 1rem; color: #10b981; }
        p { font-size: 1.2rem; color: #666; }
        .status {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1rem;
            background: #e1fdec;
            color: #065f46;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>자연바람(Natural Breeze)</h1>
        <p>서버 접속에 성공했습니다!</p>
        <div class="status">● 서비스 준비 중</div>
    </div>
</body>
</html>
